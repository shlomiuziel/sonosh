version: "2"

run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - errcheck
    - bodyclose
    - copyloopvar
    - durationcheck
    - errchkjson
    - errorlint
    - nilerr
    - nilnesserr
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
    - usestdlibvars
    - wastedassign
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
