name: docker

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build --pull -t sonosh:ci .

      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run --rm sonosh:ci --version
          docker run --rm sonosh:ci --help
          docker run --rm --entrypoint ffmpeg sonosh:ci -version
          docker run --rm --entrypoint yt-dlp sonosh:ci --version
          docker run --rm --entrypoint curl sonosh:ci --version
