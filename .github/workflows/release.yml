name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Stash GoReleaser config
        run: cp .goreleaser.yaml /tmp/.goreleaser.yaml

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout ${{ inputs.tag }}

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --config /tmp/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Resolve release metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.tag }}"
          else
            release_tag="${{ github.ref_name }}"
          fi
          release_version="${release_tag#v}"
          {
            echo "RELEASE_TAG=${release_tag}"
            echo "RELEASE_VERSION=${release_version}"
            echo "ARTIFACT_TEMPLATE=sonoscli_${release_version}_{target}.tar.gz"
          } >> "${GITHUB_ENV}"

      - name: Dispatch tap formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN with workflow dispatch access to steipete/homebrew-tap"
            exit 1
          fi

          request_id="sonoscli-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update sonoscli for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo steipete/homebrew-tap \
            --ref main \
            -f formula=sonoscli \
            -f tag="${RELEASE_TAG}" \
            -f repository=steipete/sonoscli \
            -f artifact_template="${ARTIFACT_TEMPLATE}" \
            -f request_id="${request_id}"

          run_id=""
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo steipete/homebrew-tap \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle \
              --jq ".[] | select(.displayTitle == \"${expected_title}\") | .databaseId" | head -n1)
            if [ -n "${run_id}" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "${run_id}" ]; then
            echo "::error::Could not find tap workflow run with title: ${expected_title}"
            exit 1
          fi

          gh run watch "${run_id}" \
            --repo steipete/homebrew-tap \
            --exit-status \
            --interval 10
