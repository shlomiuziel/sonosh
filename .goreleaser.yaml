version: 2

project_name: sonoscli

changelog:
  disable: true

builds:
  - id: sonos
    main: ./cmd/sonos
    binary: sonos
    env:
      - CGO_ENABLED=0
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64

universal_binaries:
  - id: sonos
    ids:
      - sonos
    name_template: sonos
    replace: true

archives:
  - builds:
      - sonos
    format: tar.gz
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ if eq .Os "darwin" }}macos-universal{{ else }}{{ .Os }}_{{ .Arch }}{{ end }}'
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
